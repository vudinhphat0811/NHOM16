<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Booking - Thực Đơn Tinh Hoa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fcfcfc;
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col justify-between">

    <div id="toast-container" class="fixed top-5 right-5 z-50 space-y-3 pointer-events-none"></div>

    <!-- Modal Đăng xuất (Cấu trúc cũ) -->
    <div id="logoutModal" class="fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300 pointer-events-auto">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300">
            <div class="text-center">
                <div class="w-12 h-12 bg-amber-50 rounded-full flex items-center justify-center mx-auto mb-4 text-[#a13d06]"><i class="fa-solid fa-arrow-right-from-bracket text-xl"></i></div>
                <h3 class="text-lg font-extrabold text-gray-900 mb-2">Xác nhận đăng xuất</h3>
                <p class="text-sm text-gray-500 font-medium leading-relaxed mb-6">Bạn có chắc chắn muốn thoát tài khoản Gourmet Booking không?</p>
            </div>
            <div class="flex space-x-3 text-sm font-bold">
                <button onclick="closeLogoutModal()" class="w-1/2 border border-gray-200 text-gray-500 py-2.5 rounded-xl hover:bg-gray-50 transition cursor-pointer">Hủy bỏ</button>
                <button onclick="confirmLogout()" class="w-1/2 bg-rose-600 text-white py-2.5 rounded-xl hover:bg-rose-700 shadow-md transition cursor-pointer">Đăng xuất</button>
            </div>
        </div>
    </div>

    <div>
        <!-- Header -->
        <header class="bg-white border-b border-gray-100 px-8 py-4 flex items-center justify-between sticky top-0 z-40 shadow-xs">
            <div class="text-[#a13d06] font-black text-xl tracking-tight cursor-pointer flex items-center space-x-2" onclick="window.location.href='/'">
                <i class="fa-solid fa-utensils"></i>
                <span>GourmetBooking</span>
            </div>
            <nav class="hidden md:flex space-x-8 text-xs font-bold uppercase tracking-wider">
                <a href="/" class="text-[#a13d06] border-b-2 border-[#a13d06] pb-1">Trang chủ</a>
                <a href="/history.html" class="text-gray-500 hover:text-[#a13d06] transition">Lịch Sử Đặt Hàng</a>
            </nav>
            <div id="authArea" class="flex items-center space-x-4 text-xs font-bold shrink-0">
                <a href="/login.html" class="text-gray-600 hover:text-gray-900 transition">Login</a>
                <a href="#" id="btnDatBanNgay" class="bg-[#d35400] text-white px-5 py-2 rounded-xl shadow-xs hover:bg-[#b34700] transition whitespace-nowrap">Đặt bàn ngay</a>
            </div>
        </header>

        <!-- Banner -->
        <section class="relative h-60 md:h-72 bg-cover bg-center flex items-center justify-center text-center px-4"
                 style="background-image: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)), url('https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=1200&q=80');">
            <div class="max-w-2xl text-white space-y-2">
                <h1 class="text-3xl md:text-4xl font-black tracking-widest uppercase">Thực Đơn Tinh Hoa</h1>
            </div>
        </section>

        <!-- Main Content -->
        <main class="max-w-6xl mx-auto px-4 py-12 space-y-16">
            <section class="space-y-6">
                <div class="flex items-center space-x-4">
                    <h2 class="text-base font-black uppercase text-gray-900 tracking-wider whitespace-nowrap">Thực đơn nhà hàng</h2>
                    <div class="w-full h-[1px] bg-gray-100"></div>
                </div>
                <div id="menuContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 pt-4"></div>
            </section>
        </main>
    </div>

    <footer class="bg-white border-t border-gray-100 py-6 text-center text-xs text-gray-400 mt-12">
        <p>&copy; 2026 Gourmet Booking. All culinary rights reserved.</p>
    </footer>

    <script>
        const token = localStorage.getItem("token");
        const authArea = document.getElementById("authArea");
        const btnDatBanNgay = document.getElementById("btnDatBanNgay");

        async function loadMenu() {
            try {
                const res = await fetch("/api/MenuAdmin/get-all-dishes");
                const dishes = await res.json();
                const container = document.getElementById("menuContainer");
                container.innerHTML = dishes.map(mon => `
                        <div class="bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-2xs transition hover:shadow-xs">
                            <div class="h-48 overflow-hidden">
                                <img src="${mon.hinhAnh || 'https://images.unsplash.com/photo-1546964124-0cce460f38ef'}" class="w-full h-full object-cover">
                            </div>
                            <div class="p-5 space-y-2">
                                <h4 class="text-sm font-black text-gray-900 truncate">${mon.tenMon}</h4>
                                <p class="text-gray-400 text-[11px] leading-relaxed font-medium line-clamp-2">${mon.moTa || 'Món ăn cao cấp'}</p>
                                <div class="pt-2 border-t border-gray-50 flex items-center justify-between">
                                    <span class="text-[#cc4e11] font-black text-sm">${Number(mon.gia).toLocaleString('vi-VN')} đ</span>
                                    <span class="text-[10px] text-gray-400 italic">${mon.trangThai || 'Đang phục vụ'}</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
            } catch (err) { console.error(err); }
        }

        document.addEventListener("DOMContentLoaded", async function () {
            await loadMenu();
            if (token) {
                try {
                    const response = await fetch("/api/Admin/current-user-role", { headers: { "Authorization": `Bearer ${token}` } });
                    if (response.ok) {
                        const data = await response.json();
                        if (data.roles && data.roles.includes("Admin")) {
                            btnDatBanNgay.style.display = "none";
                            authArea.innerHTML = `
                                    <div class="flex items-center space-x-3">
                                        <span class="text-amber-700 bg-amber-50 px-2.5 py-1 rounded-md font-bold text-xs border border-amber-200">
                                            <i class="fa-solid fa-user-shield mr-1"></i> Admin
                                        </span>
                                        <a href="/admin/dashboard.html" class="text-gray-600 hover:text-[#a13d06] font-bold text-xs transition underline">Trang quản trị</a>
                                        <span class="text-gray-300">|</span>
                                        <button onclick="openLogoutModal()" class="text-red-600 hover:text-red-800 font-bold text-xs transition cursor-pointer">Logout</button>
                                    </div>`;
                        }
                    }
                } catch (error) { console.error(error); }
            } else {
                btnDatBanNgay.onclick = () => { alert("Vui lòng đăng nhập!"); window.location.href = "/login.html"; };
            }
        });

        function openLogoutModal() { document.getElementById("logoutModal").classList.remove("hidden"); setTimeout(() => { document.getElementById("logoutModal").classList.remove("opacity-0"); }, 10); }
        function closeLogoutModal() { document.getElementById("logoutModal").classList.add("opacity-0"); setTimeout(() => document.getElementById("logoutModal").classList.add("hidden"), 300); }
        function confirmLogout() { localStorage.removeItem("token"); window.location.reload(); }
    </script>
</body>
</html>
