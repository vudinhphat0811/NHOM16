<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminPanel - Gourmet Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
        }

        .tab-btn.active {
            color: white;
            background-color: #cc4e11;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .location-tab-btn.active-loc {
            color: #cc4e11;
            border-bottom-color: #cc4e11;
            font-weight: 800;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col md:flex-row">

    <div id="toast-container" class="fixed top-5 right-5 z-50 space-y-3 pointer-events-none"></div>

    <div id="modal-container"></div>

    <aside class="w-full md:w-64 bg-[#2d3136] text-gray-400 flex flex-col justify-between shrink-0 border-r border-gray-700 sticky top-0 min-h-screen">
        <div>
            <div class="p-6 border-b border-gray-700/50">
                <div class="text-white text-xl font-black tracking-tight flex items-center space-x-1 cursor-pointer" onclick="window.location.href='/'">
                    <span>Admin</span><span class="text-orange-500">Panel</span>
                </div>
                <p class="text-[10px] text-gray-400 font-semibold tracking-wider mt-0.5 uppercase">Gourmet Portal</p>
            </div>
            <nav class="p-4 space-y-1 text-xs font-bold tracking-wide">
                <button onclick="switchTab('order', this)" class="tab-btn active w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-left cursor-pointer"><i class="fa-regular fa-rectangle-list text-sm w-5"></i> <span>Order Management</span></button>
                <button onclick="switchTab('table', this)" class="tab-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-left cursor-pointer"><i class="fa-solid fa-map text-sm w-5"></i> <span>Table Map</span></button>
                <button onclick="switchTab('menu', this)" class="tab-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-left cursor-pointer"><i class="fa-solid fa-utensils text-sm w-5"></i> <span>Menu Management</span></button>
                <button onclick="switchTab('category', this)" class="tab-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-left cursor-pointer"><i class="fa-solid fa-folder-open text-sm w-5"></i> <span>Category Management</span></button>
            </nav>
        </div>
        <div class="border-t border-gray-700/50 bg-[#25282d] p-4 space-y-4">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-10 bg-white text-gray-800 flex items-center justify-center rounded-full font-bold text-xs">AD</div>
                <div><h4 class="text-white text-xs font-bold" id="lblAdminName">admin</h4><p class="text-[10px] text-gray-500 font-medium">Administrator</p></div>
            </div>
            <button onclick="openLogoutModal()" class="w-full flex items-center space-x-2 text-xs font-bold text-gray-400 hover:text-rose-400 transition pt-2 border-t border-gray-700/30 text-left cursor-pointer"><i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span></button>
        </div>
    </aside>

    <main class="flex-grow flex flex-col min-h-screen overflow-x-hidden">
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-xs sticky top-0 z-40">
            <div id="lblHeaderContext" class="text-xs font-bold text-gray-800 uppercase tracking-wider">Order Management</div>
            <div id="divHeaderSearchArea" class="relative min-w-[240px]">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                <input type="text" id="txtOrderSearch" onkeyup="handleOrderSearch()" placeholder="Tìm tên khách, SĐT..." class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-9 pr-4 py-1.5 text-xs font-semibold focus:outline-none focus:border-[#cc4e11] focus:bg-white transition placeholder-gray-400">
            </div>
        </header>

        <div id="main-content" class="p-6 flex-grow space-y-6"></div>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
