<div class="space-y-5">
    <div class="flex items-center justify-between">
        <div>
            <h2 class="text-xl font-bold text-gray-900 tracking-tight">Quản lý Danh mục Món ăn</h2>
        </div>

        <button type="button"
                onclick="openCategoryFormModal()"
                style="cursor: pointer !important;"
                class="bg-[#cc4e11] hover:bg-[#a13d06] text-white text-xs font-bold px-4 py-2.5 rounded-lg shadow-2xs transition-all flex items-center space-x-1.5 select-none active:scale-95">
            <i class="fa-solid fa-plus text-[10px]"></i>
            <span>Thêm danh mục</span>
        </button>
    </div>

    <div class="bg-white border border-gray-200 rounded-xl max-w-2xl overflow-hidden shadow-xs">
        <table class="w-full text-left text-xs border-collapse">
            <thead>
                <tr class="bg-gray-50 border-b border-gray-100 text-gray-400 font-bold uppercase tracking-wider text-[10px]">
                    <th class="p-4 w-20 text-center">ID</th>
                    <th class="p-4">Tên danh mục thực đơn</th>
                    <th class="p-4 w-32 text-center">Thao tác</th>
                </tr>
            </thead>
            <tbody id="tbCategoryBody" class="divide-y divide-gray-100 text-gray-600 font-semibold">
                <tr>
                    <td colspan="3" class="p-8 text-center text-gray-400 italic">
                        <i class="fa-solid fa-spinner fa-spin mr-2"></i> Đang tải dữ liệu danh mục từ cơ sở dữ liệu mây...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
