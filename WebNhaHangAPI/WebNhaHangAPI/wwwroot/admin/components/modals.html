<div id="logoutModal" class="fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300 pointer-events-auto">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300">
        <div class="text-center">
            <div class="w-12 h-12 bg-amber-50 rounded-full flex items-center justify-center mx-auto mb-4 text-[#a13d06]"><i class="fa-solid fa-arrow-right-from-bracket text-xl"></i></div>
            <h3 class="text-lg font-extrabold text-gray-900 mb-2">Xác nhận đăng xuất</h3>
            <p class="text-sm text-gray-500 font-medium mb-6">Bạn có chắc chắn muốn thoát khỏi hệ thống quản trị?</p>
        </div>
        <div class="flex space-x-3 text-sm font-bold">
            <button onclick="closeLogoutModal()" class="w-1/2 border border-gray-200 text-gray-500 py-2.5 rounded-xl hover:bg-gray-50 transition">Hủy bỏ</button>
            <button onclick="confirmLogout()" class="w-1/2 bg-rose-600 text-white py-2.5 rounded-xl hover:bg-rose-700 shadow-md transition">Đăng xuất</button>
        </div>
    </div>
</div>

<div id="menuFormModal" class="fixed inset-0 bg-black/40 backdrop-blur-xs flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300 pointer-events-auto">
    <div class="bg-white rounded-2xl p-6 max-w-md w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300">
        <div class="flex items-center justify-between border-b border-gray-100 pb-3 mb-4">
            <h3 id="lblMenuModalTitle" class="text-xs font-bold text-gray-900 uppercase">Thêm món ăn mới</h3>
            <button onclick="closeMenuFormModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form class="space-y-4 text-xs font-bold text-gray-500" onsubmit="event.preventDefault(); saveMenuData();">
            <input type="hidden" id="txtDishId">
            <div>
                <label class="block mb-1 uppercase">Tên món ăn <span class="text-red-500">*</span></label>
                <input type="text" id="txtDishName" required class="w-full border border-gray-200 rounded-lg px-3 py-2 text-gray-700 font-semibold bg-gray-50/50">
            </div>
            <div>
                <label class="block mb-1 uppercase">Danh mục</label>
                <select id="ddlDishCategory" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-gray-700 font-semibold bg-gray-50/50"></select>
            </div>
            <div>
                <label class="block mb-1 uppercase">Giá bán (VNĐ) <span class="text-red-500">*</span></label>
                <input type="number" id="txtDishPrice" required class="w-full border border-gray-200 rounded-lg px-3 py-2 text-gray-700 font-semibold bg-gray-50/50">
            </div>
            <div>
                <label class="block mb-1 uppercase">Hình ảnh món ăn</label>
                <input type="file" id="fileDishImage" accept="image/*" class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-gray-700 font-semibold file:mr-4 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-orange-50 file:text-[#cc4e11] hover:file:bg-orange-100">
            </div>
            <div>
                <label class="block mb-1 uppercase">Trạng thái phục vụ</label>
                <select id="ddlDishStatus" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-gray-700 font-semibold bg-gray-50/50">
                    <option value="Đang phục vụ">Đang phục vụ</option>
                    <option value="Tạm hết">Tạm hết</option>
                </select>
            </div>
            <div class="flex space-x-3 pt-2">
                <button type="button" onclick="closeMenuFormModal()" class="w-1/2 border border-gray-200 text-gray-400 py-2.5 rounded-lg hover:bg-gray-50">Hủy</button>
                <button type="submit" class="w-1/2 bg-[#cc4e11] text-white py-2.5 rounded-lg hover:bg-[#b5430d] shadow-xs">Lưu lại</button>
            </div>
        </form>
    </div>
</div>

<div id="categoryFormModal" class="fixed inset-0 bg-black/40 backdrop-blur-xs flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300 pointer-events-auto">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300">
        <div class="flex items-center justify-between border-b border-gray-100 pb-3 mb-4">
            <h3 id="lblCategoryModalTitle" class="text-xs font-bold text-gray-900 uppercase">Thêm danh mục mới</h3>
            <button onclick="closeCategoryFormModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form class="space-y-4 text-xs font-bold text-gray-500" onsubmit="event.preventDefault(); saveCategoryData();">
            <input type="hidden" id="txtCategoryId">
            <div>
                <label class="block mb-1 uppercase">Tên danh mục <span class="text-red-500">*</span></label>
                <input type="text" id="txtCategoryName" required placeholder="Ví dụ: Món nướng, Món lẩu" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-gray-700 font-semibold bg-gray-50/50">
            </div>
            <div class="flex space-x-3 pt-2">
                <button type="button" onclick="closeCategoryFormModal()" class="w-1/2 border border-gray-200 text-gray-400 py-2.5 rounded-lg hover:bg-gray-50">Hủy</button>
                <button type="submit" class="w-1/2 bg-[#cc4e11] text-white py-2.5 rounded-lg hover:bg-[#b5430d] shadow-xs">Lưu dữ liệu</button>
            </div>
        </form>
    </div>
</div>

<div id="locationFormModal" class="fixed inset-0 bg-black/40 backdrop-blur-xs flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300 pointer-events-auto">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300">
        <div class="flex items-center justify-between border-b border-gray-100 pb-3 mb-4">
            <h3 id="lblLocationModalTitle" class="text-xs font-bold text-gray-900 uppercase">Thêm khu vực mới</h3>
            <button onclick="closeLocationFormModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form class="space-y-4 text-xs font-bold text-gray-500" onsubmit="event.preventDefault(); saveLocationData();">
            <input type="hidden" id="txtLocationId">
            <div>
                <label class="block mb-1 uppercase">Tên vị trí / Khu vực <span class="text-red-500">*</span></label>
                <input type="text" id="txtLocationName" required placeholder="Ví dụ: Tầng trệt, Lầu 1, Phòng VIP" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-gray-700 font-semibold bg-gray-50/50">
            </div>
            <div class="flex space-x-3 pt-2">
                <button type="button" onclick="closeLocationFormModal()" class="w-1/2 border border-gray-200 text-gray-400 py-2.5 rounded-lg hover:bg-gray-50">Hủy</button>
                <button type="submit" class="w-1/2 bg-[#cc4e11] text-white py-2.5 rounded-lg hover:bg-[#b5430d] shadow-xs">Lưu khu vực</button>
            </div>
        </form>
    </div>
</div>

<div id="tableFormModal" class="fixed inset-0 bg-black/40 backdrop-blur-xs flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300 pointer-events-auto">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300">
        <div class="flex items-center justify-between border-b border-gray-100 pb-3 mb-4">
            <h3 id="lblTableModalTitle" class="text-xs font-bold text-gray-900 uppercase">Thêm bàn ăn mới</h3>
            <button onclick="closeTableFormModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form class="space-y-4 text-xs font-bold text-gray-500" onsubmit="event.preventDefault(); saveTableData();">
            <input type="hidden" id="txtTableId">
            <input type="hidden" id="txtTableIsChinhThuc" value="false">
            <div>
                <label class="block mb-1 uppercase">Tên bàn / Số bàn <span class="text-red-500">*</span></label>
                <input type="text" id="txtTableName" required placeholder="Ví dụ: T1.01, V2.10" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-gray-700 font-semibold bg-gray-50/50">
            </div>
            <div>
                <label class="block mb-1 uppercase">Số chỗ ngồi</label>
                <input type="number" id="txtTableCapacity" required value="4" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-gray-700 font-semibold bg-gray-50/50">
            </div>
            <div>
                <label class="block mb-1 uppercase">Trạng thái bàn</label>
                <select id="ddlTableStatus" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-gray-700 font-semibold bg-gray-50/50">
                    <option value="Trống">Trống</option>
                    <option value="Có khách">Có khách</option>
                </select>
            </div>
            <div>
                <label class="block mb-1 uppercase">Thuộc khu vực tầng</label>
                <select id="ddlTableLocation" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-gray-700 font-semibold bg-gray-50/50"></select>
            </div>
            <div class="flex space-x-3 pt-2">
                <button type="button" onclick="closeTableFormModal()" class="w-1/2 border border-gray-200 text-gray-400 py-2.5 rounded-lg hover:bg-gray-50">Hủy</button>
                <button type="submit" class="w-1/2 bg-[#cc4e11] text-white py-2.5 rounded-lg hover:bg-[#b5430d] shadow-xs">Lưu bàn</button>
            </div>
        </form>
    </div>
</div>
