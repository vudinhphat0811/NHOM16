<div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
    <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-xs space-y-4">
        <div class="border-b border-gray-50 pb-3">
            <h3 class="text-xs font-black text-gray-800 uppercase tracking-wider">
                <i class="fa-solid fa-users mr-1 text-indigo-600"></i> Danh Sách Tài Khoản
            </h3>
        </div>

        <div class="space-y-2 max-h-[450px] overflow-y-auto pr-1" id="divRoleGroupContainer">
            <div class="p-3 text-center text-gray-400 font-semibold text-xs">
                <i class="fa-solid fa-spinner fa-spin mr-2"></i>Đang tải dữ liệu...
            </div>
        </div>
    </div>

    <div class="xl:col-span-2 bg-white rounded-2xl border border-gray-200 shadow-xs overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <div>
                <h3 class="text-xs font-black text-gray-800 uppercase tracking-wider">Thay đổi quyền truy cập</h3>
                <p class="text-[10px] text-gray-400 font-semibold mt-0.5">Chuyển đổi nhóm quyền cho tài khoản đang chọn</p>
            </div>
            <button onclick="luuCauHinhPhanQuyen()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-1.5 px-4 rounded-xl text-xs flex items-center space-x-2 transition cursor-pointer shadow-xs">
                <i class="fa-solid fa-floppy-disk"></i>
                <span>Cập Nhật Quyền</span>
            </button>
        </div>

        <div class="p-6 space-y-6">
            <div class="space-y-2">
                <label class="text-xs font-black text-gray-700 uppercase tracking-wider">
                    Tài khoản đang chọn: <span id="lblSelectedUserEmail" class="text-indigo-600 lowercase ml-1"></span>
                </label>

                <select id="ddlUserRoleSelect" onchange="thayDoiGiaoDienCheckboxTheoQuyen(this.value)" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 text-xs font-bold focus:outline-none focus:border-indigo-600 focus:bg-white transition">
                    <option value="Admin">Admin (Quản trị viên - Toàn quyền vào hệ thống)</option>
                    <option value="Customer">Customer (Khách hàng - Chỉ đặt bàn, không có quyền Admin)</option>
                </select>
            </div>

            <div class="border border-gray-100 rounded-2xl overflow-hidden shadow-2xs">
                <table class="w-full text-left border-collapse text-xs font-semibold text-gray-600">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 border-b border-gray-200 uppercase tracking-wider text-[10px]">
                            <th class="px-6 py-3.5">Khu vực chức năng</th>
                            <th class="px-6 py-3.5 text-center">Giao diện Khách hàng</th>
                            <th class="px-6 py-3.5 text-center">Hệ thống Admin Panel</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100" id="tbRoleMatrixBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
