<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Chỉnh Sửa Món Ăn Của Đơn</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 p-8">

    <div class="max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow-sm space-y-6">
        <h2 class="text-xl font-black text-gray-900">✏️ Quản lý món ăn của đơn</h2>
        <hr class="border-gray-100">

        <div class="bg-gray-50 p-4 rounded-xl space-y-3">
            <h3 class="text-xs font-bold text-gray-700 uppercase">Thêm món mới vào đơn này:</h3>

            <form action="/api/DatBan/html-them-mon" method="POST" class="flex space-x-2">
                <input type="hidden" name="datBanId" id="txtDatBanId" value="1">

                <select name="monAnId" class="w-full bg-white border border-gray-200 rounded-lg p-2 text-sm font-medium" required>
                    <option value="1">Lẩu Thái Hải Sản (350,000đ)</option>
                    <option value="2">Bò Mỹ Thượng Hạng (120,000đ)</option>
                    <option value="3">Coca Cola (15,000đ)</option>
                </select>

                <input type="number" name="soLuong" value="1" min="1" class="w-20 bg-white border border-gray-200 rounded-lg p-2 text-center text-sm font-bold">

                <button type="submit" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-emerald-700 transition">
                    Thêm
                </button>
            </form>
        </div>

        <div class="space-y-3">
            <h3 class="text-xs font-bold text-gray-700 uppercase">Danh sách món ăn hiện tại:</h3>

            <div class="space-y-2">
                <div class="flex items-center justify-between border border-gray-100 p-3 rounded-xl bg-white shadow-2xs">
                    <div>
                        <p class="text-sm font-bold text-gray-800">Lẩu Thái Hải Sản</p>
                        <p class="text-xs text-orange-600 font-bold">350.000 đ</p>
                    </div>

                    <div class="flex items-center space-x-4">
                        <form action="/api/DatBan/html-sua-so-luong" method="POST" class="flex items-center space-x-1">
                            <input type="hidden" name="datBanId" value="1">
                            <input type="hidden" name="monAnId" value="1">
                            <input type="number" name="soLuongMoi" value="2" min="0" class="w-12 border border-gray-200 rounded p-1 text-center text-xs font-bold">
                            <button type="submit" class="bg-blue-600 text-white px-2 py-1 rounded text-xs">Lưu</button>
                        </form>

                        <form action="/api/DatBan/html-xoa-mon" method="POST" onsubmit="return confirm('Xóa món này?');">
                            <input type="hidden" name="datBanId" value="1">
                            <input type="hidden" name="monAnId" value="1">
                            <button type="submit" class="text-red-500 hover:text-red-700 text-sm">
                                <i class="fa-solid fa-trash"></i> Xóa
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
